name: Build
on:
  push:
    branches: [ main, master ] # 提交代码自动触发，方便测试，不需要可删除
  workflow_dispatch: # 保留手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 修复：NDK环境变量精准匹配，避免路径失效
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          link-to-sdk: true

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # 修复：完整拉取子模块，解决gamepwnage依赖缺失问题
      - name: Clone NiseAPI
        run: |
          git clone --recursive --depth 1 https://github.com/Lodingglue/nise-api.git niseAPI
          ls -la niseAPI/
          ls -la niseAPI/deps/ # 打印目录，确认子模块拉取成功

      - name: Clone MiniAPI
        run: |
          git clone --depth 1 https://github.com/NexCaise/Ambient-MiniAPI.git miniAPI
          ls -la miniAPI/

      # 修复：更新xmake仓库索引，避免包仓库失效
      - name: Update xmake repo
        run: |
          xmake repo --update

      # 修复：使用NDK绝对路径，避免环境变量识别失败
      - name: Configure and Build
        run: |
          xmake f -p android -a arm64-v8a --ndk=${{ steps.setup-ndk.outputs.ndk-path }} -m release -y -vD
          xmake -y -vD # 加-vD打印详细日志，出错可直接定位

      # 修复：先确认编译产物存在，再上传
      - name: Check Build Output
        run: |
          ls -la build/android/arm64-v8a/release/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libBetterTooltips
          path: build/android/arm64-v8a/release/*.so # 只上传核心so文件，避免路径错误
